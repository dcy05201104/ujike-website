<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 氏家社会保険労務士事務所</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">氏家社会保険労務士事務所</a></div>
        <nav><ul><li><a href="index.html">ホームに戻る</a></li></ul></nav>
    </header>

    <main class="contact-page fade-in">
        <div class="contact-header">
            <h1>お問い合わせ</h1>
            <p>ご質問、お見積りのご依頼など<br class="br-sp">お気軽にお問い合わせください。</p>
        </div>

        <div class="form-container">
            <form action="https://formspree.io/f/xpqywkje" method="POST">
                
                <div class="form-group">
                    <label>お名前 <span class="required">必須</span></label>
                    <input type="text" name="name" class="form-input" placeholder="サンプル 花子" required>
                </div>

                <div class="form-group">
                    <label>お電話番号</label>
                    <input type="tel" name="phone" class="form-input" placeholder="080-xxxx-xxxx">
                </div>

                <div class="form-group">
                    <label>メールアドレス <span class="required">必須</span></label>
                    <input type="email" name="email" class="form-input" placeholder="xxxx@example.com" required>
                </div>

                <div class="form-group">
                    <label>年代</label>
                    <select name="age" class="form-select">
                        <option value="選択してください">選択してください</option>
                        <option value="10代">10代</option>
                        <option value="20代">20代</option>
                        <option value="30代">30代</option>
                        <option value="40代">40代</option>
                        <option value="50代">50代</option>
                        <option value="60代以上">60代以上</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>性別</label>
                    <div class="check-radio-group">
                        <label><input type="radio" name="gender" value="男性"> 男性</label>
                        <label><input type="radio" name="gender" value="女性"> 女性</label>
                        <label><input type="radio" name="gender" value="無回答"> 無回答</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>お問い合わせ内容 <span class="required">必須</span></label>
                    <textarea name="message" class="form-textarea" placeholder="ご自由にご記入ください" required></textarea>
                </div>

                <div class="submit-area">
                    <button type="submit" class="submit-btn">同意して送信</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p class="copyright">© 2026 氏家社会保険労務士事務所 All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
